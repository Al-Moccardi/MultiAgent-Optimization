  - A_patrimoniale_comunione
  - A_succ_legittima
- id: GS015
  text: 'Collation in Italian succession law: what does it consist of and which donations fall within it?'
  expected_agents:
  - A_succ_legittima
  difficulty: medium
  risk_level: medium
  category: collazione
  ground_truth_answer: Collation (Arts. 737 ff. CC) is the obligation of children and other descendants and of the spouse who accept the inheritance to return (conferire) to the estate the donations they received from the deceased during his life, so that the relictum and the donatum are divided proportionally and equality among the coheirs is preserved. It can be made in kind or by imputation - for immovables at the election of the donee (Art. 746 CC), for movables by imputation (Art. 750 CC); for money see Art. 751 CC. Subject to collation are direct and indirect donations. Excluded are expenses of maintenance, education and customary or modest gifts (Art. 742 CC), and donations for which the testator expressly granted a dispensation from collation, valid within the disposable quota (Art. 737, para. 1 CC).
