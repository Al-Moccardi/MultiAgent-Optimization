- id: NEW_STRESS_004
  text: Two spouses, married under the separation-of-property regime, are in contested separation proceedings. During the proceedings the husband dies leaving a holographic will that names a third party as universal heir. The wife claims her reserved share and contests the will. What is the impact of the unresolved separation on succession rights, and how does the matrimonial property regime affect the hereditary mass?
  expected_agents:
  - A_separazione_contenziosa
  - A_succ_testamentaria
  - A_succ_legittima
  - A_patrimoniale_separazione
  difficulty: complex
  risk_level: high
  high_risk: true
  category: separation_pending_succession
  ground_truth_answer: 'Effect of the pending separation: a contested separation that has not been pronounced is extinguished by the husband''s death, so the spouses are still married at the opening of the succession; the wife is a forced heir. (Only a final separation pronounced against her with a charge of fault would reduce her rights to a life annuity under Art. 548 CC.) Property regime: under the separation-of-property regime (Art. 215 CC) there is no community to divide, so the whole of the husband''s own assets forms the relictum - no half is split off for the wife. Reserved share: the spouse not concurring with children is reserved 1/2 of the estate, with 1/2 disposable (Art. 540 CC). Remedies: the holographic will is valid if it meets Art. 602 CC; the wife may both contest its formal validity (Art. 606 CC) and, recovering her legittima, bring the action for reduction against the third-party heir (Arts. 553 ff. CC).'
  gold_law_ids:
  - IT_CC_art_215
  - IT_CC_art_540
  - IT_CC_art_548
  - IT_CC_art_602
  - IT_CC_art_553
