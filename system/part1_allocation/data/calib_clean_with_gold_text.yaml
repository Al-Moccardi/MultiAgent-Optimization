- id: NEW_STRESS_007
  text: Following an attempted contested separation that fails in court, the spouses proceed with family mediation and reach a consensual settlement that includes the assignment of the marital home to the wife and custody of two minor children to her. One year later the wife dies, and the children inherit her share of the marital home. The ex-husband requests appointment as tutor and authorization to manage the inherited real estate.
  expected_agents:
  - A_separazione_contenziosa
  - A_negoziazione_assistita_e_mediazione_familiare
  - A_separazione_consensuale
  - A_succ_legittima
  - A_tutela_minori
  - A_volontaria_giurisdizione
  difficulty: complex
  risk_level: high
  high_risk: true
  category: separation_succession_minors_tutela
  ground_truth_answer: 'Assignment of the family home: the home had been assigned to the wife in the interest of the children (Art. 337-sexies CC); on her death that assignment ends, and the children inherit her ownership share of the home as her sole/principal heirs (Art. 566 CC). Parental authority and guardianship: the surviving father in principle resumes exclusive parental responsibility (Arts. 316-317 CC); where he is to be appointed tutor (e.g. he had been excluded, or a conflict exists) the tutelary judge makes the appointment (Arts. 343, 346 CC). Management of the inherited property: acts of extraordinary administration on the minors'' real estate - sale, mortgage, lease over nine years - require authorisation of the tutelary judge (Arts. 320, para. 3, 374 and 375 CC), in voluntary jurisdiction. The earlier mediated separation settlement governs the separation only and does not bind the succession.'
  gold_law_ids:
  - IT_CC_art_566
  - IT_CC_art_337sexies
  - IT_CC_art_320
  - IT_CC_art_374
  - IT_CC_art_375
