- id: GS013
  text: 'Renunciation of inheritance: required form, effects, and term for challenging it'
  expected_agents:
  - A_succ_legittima
  - A_volontaria_giurisdizione
  difficulty: medium
  risk_level: medium
  category: rinuncia
  ground_truth_answer: 'Renunciation of an inheritance must be made by an express declaration received by a notary or by the clerk of the court of the place where the succession opened, and entered in the succession register (Art. 519 CC); it cannot be partial, conditional or subject to a term (Art. 520 CC). Effect: the renouncer is treated as never having been called, and his share accrues to the other heirs or passes by representation or substitution (Art. 522 CC). The right to accept or renounce is subject to a ten-year limitation period (Art. 480 CC); renunciation may be revoked so long as the right has not prescribed and no other entitled person has accepted (Art. 525 CC). Creditors of the renouncer prejudiced by the renunciation may obtain authorisation to accept the inheritance in his name, within five years, to satisfy their claims (Art. 524 CC).'
  gold_law_ids:
  - IT_CC_art_519
  - IT_CC_art_520
  - IT_CC_art_524
  - IT_CC_art_525
