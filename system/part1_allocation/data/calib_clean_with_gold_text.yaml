- id: NEW_STRESS_002
  text: The testator dies leaving a will that institutes a foundation as universal heir, while the surviving spouse and two adult children claim violation of the reserved share. Mediation between the heirs and the foundation is attempted before bringing the action. How is the reserved portion computed, what remedies are available, and what is the role of family mediation in this dispute?
  expected_agents:
  - A_succ_testamentaria
  - A_succ_legittima
  - A_negoziazione_assistita_e_mediazione_familiare
  difficulty: complex
  risk_level: high
  category: legittima_lesa_mediation
  ground_truth_answer: 'Reserved portion: with the spouse concurring with two (or more) children, the children are reserved 1/2 collectively and the spouse 1/4, leaving 1/4 disposable (Art. 542, para. 2 CC). Computation: take the relictum, deduct the debts, and add back (riunione fittizia) the value of the deceased''s lifetime donations (Art. 556 CC); the reserved quotas are computed on this notional mass. Remedy: the forced heirs bring the action for reduction against the foundation (Arts. 553-564 CC), first reducing the testamentary disposition and then, if necessary, the donations, with restitution of the assets needed to fill the reserve (Art. 561 CC); the action is subject to the ten-year limitation. Role of mediation: disputes over hereditary division and successions are subject to mandatory mediation as a condition of admissibility of the claim (Art. 5 D.Lgs. 28/2010); family mediation/assisted negotiation can produce a settlement among the heirs and the foundation, but it cannot extinguish a forced heir''s reserved right unless that heir consents.'
  gold_law_ids:
  - IT_CC_art_542
  - IT_CC_art_556
  - IT_CC_art_553
  - IT_CC_art_564
  - IT_DLgs_28_2010_art_5
