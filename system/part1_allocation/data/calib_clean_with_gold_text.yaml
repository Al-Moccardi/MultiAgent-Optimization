- id: GS003
  text: Can a holographic will be revoked by destroying it? What precautions should be taken?
  expected_agents:
  - A_succ_testamentaria
  difficulty: medium
  risk_level: medium
  category: succession_revocation
  ground_truth_answer: 'Yes. Under Art. 684 CC the total or partial destruction, cancellation or obliteration of a holographic will, carried out by the testator or with his knowledge, produces revocation, unless it is shown that the destruction was the work of a third party, accidental, or done without revocatory intent (animus revocandi). Precautions: the act must be performed by the testator with clear intent to revoke; every original/copy should be destroyed to avoid reconstruction; and, to forestall disputes, revocation is more safely made by a later will (Art. 681 CC) or by an express revocation declared before a notary and two witnesses (Art. 680 CC).'
  gold_law_ids:
  - IT_CC_art_684
  - IT_CC_art_680
  - IT_CC_art_681
  gold_law_passages:
