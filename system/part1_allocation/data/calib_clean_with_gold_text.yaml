- id: GS002
  text: Must a public will always be drafted in the presence of two witnesses?
  expected_agents:
  - A_succ_testamentaria
  difficulty: simple
  risk_level: low
  category: succession_validity
  ground_truth_answer: Yes. Under Art. 603 CC the public will (testamento pubblico) is received by a notary in the continuous presence of two witnesses. The testator declares his wishes orally to the notary, who reduces them to writing and reads the act back to the testator in the witnesses' presence; mention of compliance with these formalities must appear in the deed, which is signed by testator, witnesses and notary. The two witnesses are an essential, non-waivable formality, so a public will always requires them.
  gold_law_ids:
  - IT_CC_art_603
  gold_law_passages:
