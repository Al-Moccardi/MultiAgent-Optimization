- id: GS006
  text: Difference between a specific legacy and a generic legacy under Italian law
  expected_agents:
  - A_succ_testamentaria
  difficulty: simple
  risk_level: low
  category: legato
  ground_truth_answer: 'A specific legacy (legato di specie, Art. 649 CC) has real effect: ownership of the determinate thing belonging to the testator passes to the legatee automatically at the opening of the succession, and the risk of loss falls on the legatee. A generic legacy (legato di genere or di quantita, Art. 653 CC) has only obligational effect: the burdened heir must deliver or procure a thing of the indicated kind; ownership passes only upon individualisation/delivery, and until then the risk lies with the heir. Choice of the thing, absent contrary will, belongs to the obligor who must give a thing of average quality (Art. 664 CC).'
  gold_law_ids:
  - IT_CC_art_649
  - IT_CC_art_653
  - IT_CC_art_660
  gold_law_passages:
