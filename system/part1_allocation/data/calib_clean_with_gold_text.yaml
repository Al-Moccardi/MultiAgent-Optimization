- id: NEW_STRESS_008
  text: A testator leaves a will dividing the estate among three heirs, two of whom are minors under guardianship. One minor tutor seeks court authorization to accept the inheritance with benefit of inventory; the other minor tutor seeks to renounce due to encumbered assets. The third heir, an adult, opens collation proceedings. What procedural framework governs these divergent positions?
  expected_agents:
  - A_succ_testamentaria
  - A_succ_legittima
  - A_tutela_minori
  - A_volontaria_giurisdizione
  difficulty: complex
  risk_level: medium
  category: testate_succession_minors_divergent
  ground_truth_answer: 'Procedural framework: each heir decides independently, so divergent choices are admissible. For each minor acceptance is necessarily with benefit of inventory (Art. 471 CC), and the tutor needs authorisation of the tutelary judge to accept (Art. 374, no. 3 CC) or, in the second minor''s case, to renounce (Arts. 320 and 374 CC); the renouncing minor''s share accrues to the coheirs or passes by representation/substitution (Art. 522 CC). The adult heir may demand collation in the division: descendants and the spouse who accept must confer the donations received (Arts. 737 ff. CC). Sequence: the authorisations are obtained in voluntary jurisdiction; the estate is then divided - amicably, or by judicial division (Arts. 784 ff. CPC) if there is no agreement - with the collation account settled; the minors are represented by their tutors, with a special curator where their interests conflict (Art. 320, last para. CC).'
  gold_law_ids:
  - IT_CC_art_471
  - IT_CC_art_374
  - IT_CC_art_522
  - IT_CC_art_737
  - IT_CPC_art_784
