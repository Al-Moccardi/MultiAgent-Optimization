- id: NEW_STRESS_005
  text: A consensually-separated couple with one minor child reaches an agreement via assisted negotiation that includes mutual succession provisions. The wife later dies intestate, leaving the minor child as sole heir. The ex-husband, as tutor, must request court authorization to renounce part of the inheritance burdened with debts. Outline the steps.
  expected_agents:
  - A_separazione_consensuale
  - A_negoziazione_assistita_e_mediazione_familiare
  - A_succ_legittima
  - A_tutela_minori
  - A_volontaria_giurisdizione
  difficulty: complex
  risk_level: high
  category: consensual_separation_succession_minor
  ground_truth_answer: 'Steps: (1) Note that succession agreements are void (Art. 458 CC), so the ''mutual succession provisions'' inserted in the assisted-negotiation agreement cannot bind the future succession; they have no effect on the devolution. (2) On the wife''s intestate death the minor child is sole heir (Art. 566 CC); the separated/ex-spouse is not an heir. (3) Because the inheritance is burdened with debts, the protective course is acceptance with benefit of inventory (Art. 471 CC) to cap liability intra vires; outright renunciation for the minor is possible but only on the child''s interest. (4) The father, exercising parental responsibility/as tutor, files a petition with the tutelary judge (voluntary jurisdiction) for authorisation to renounce (Arts. 320 and 374, no. 3 CC), showing the renunciation serves the minor''s interest. (5) If authorised, the renunciation is declared before the notary or court clerk and entered in the succession register (Art. 519 CC).'
  gold_law_ids:
  - IT_CC_art_458
  - IT_CC_art_566
  - IT_CC_art_320
  - IT_CC_art_519
  - IT_CC_art_471
