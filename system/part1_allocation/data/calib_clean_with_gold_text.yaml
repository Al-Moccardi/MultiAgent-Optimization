    text: 'A specific legacy (legato di specie, Art. 649 CC) has real effect: ownership of the determinate thing belonging to the testator passes to the legatee automatically at the opening of the succession, and the risk of loss falls on the legatee. A generic legacy (legato di genere or di quantita, Art. 653 CC) has only obligational effect: the burdened heir must deliver or procure a thing of the indicated kind; ownership passes only upon individualisation/delivery, and until then the risk lies with the heir. Choice of the thing, absent contrary will, belongs to the obligor who must give a thing of average quality (Art. 664 CC).'
