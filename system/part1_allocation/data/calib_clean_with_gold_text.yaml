- id: NEW_STRESS_009
  text: A couple in consensual separation with one minor child negotiate, through assisted negotiation, an agreement that includes mutual reciprocal wills naming each other as beneficiaries with substitution in favor of the minor. The separation is ratified, but one spouse dies before the will is updated. The surviving spouse and the minor (through tutor) both claim. What is the validity of the reciprocal will after separation, and what is the minor reserved share?
  expected_agents:
  - A_separazione_consensuale
  - A_negoziazione_assistita_e_mediazione_familiare
  - A_succ_testamentaria
  - A_succ_legittima
  - A_tutela_minori
  difficulty: complex
  risk_level: high
  category: reciprocal_wills_separation_minor
  ground_truth_answer: 'Validity of the reciprocal will: Art. 589 CC prohibits joint and reciprocal wills - two persons cannot test in the same document, whether for a third party or reciprocally; such a will is void. If instead each spouse made a separate mirror will, each is individually valid. The succession provisions agreed in the assisted negotiation are also void as succession agreements (Art. 458 CC). Effect of separation: a consensual separation without a charge of fault does not remove spousal succession rights - the separated, non-faulted spouse inherits as a spouse (Art. 548 CC) - so the surviving spouse remains a forced heir. Reserved shares with spouse + one child: the child is reserved 1/3 and the spouse 1/3, leaving 1/3 disposable (Art. 542, para. 1 CC); the minor''s reserved third is claimed through the tutor, with acceptance by benefit of inventory and the usual authorisations.'
