- id: NEW_STRESS_003
  text: A widowed father with two minor children dies leaving an estate that includes real estate co-owned with his late wife under a community-of-property regime that was never dissolved. A tutor must be appointed for the children, and authorization from the guardianship judge is required to accept the inheritance with benefit of inventory. What is the procedural sequence?
  expected_agents:
  - A_succ_legittima
  - A_tutela_minori
  - A_volontaria_giurisdizione
  - A_patrimoniale_comunione
  difficulty: complex
  risk_level: high
  category: succession_minors_property
  ground_truth_answer: 'Procedural sequence: (1) Because the legal community with the predeceased wife was never dissolved, it must first be liquidated (Art. 191 CC): the wife''s half already devolved through her own succession, so the co-owned real estate is settled and apportioned before the father''s estate is divided. (2) The father''s succession opens; the two minor children are his sole intestate heirs in equal shares (Art. 566 CC). (3) A tutor is appointed for the minors by the tutelary judge, both parents being deceased (Arts. 343, 346 CC). (4) Acceptance for the minors is necessarily with benefit of inventory (Art. 471 CC). (5) The tutor petitions the tutelary judge for authorisation to accept with benefit of inventory (Art. 374, no. 3 CC) - voluntary jurisdiction. (6) The inventory is drawn up (Art. 484 CC). (7) Any subsequent act of extraordinary administration on the children''s real estate requires further authorisation (Art. 375 CC).'
  gold_law_ids:
  - IT_CC_art_191
  - IT_CC_art_566
  - IT_CC_art_346
  - IT_CC_art_471
  - IT_CC_art_374
  - IT_CC_art_484
