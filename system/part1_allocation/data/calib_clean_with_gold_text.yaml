- id: GS011
  text: What happens if an heir predeceases the deceased? Explain the doctrine of representation.
  expected_agents:
  - A_succ_legittima
  difficulty: medium
  risk_level: low
  category: rappresentazione
  ground_truth_answer: 'If an heir cannot or does not wish to accept - for example because he predeceased the deceased, is unworthy, or renounces - the doctrine of representation (Arts. 467-469 CC) allows his descendants to take his place and degree in the succession. Representation operates ad infinitum in favour of the descendants of the deceased''s children and of the descendants of the deceased''s siblings (Art. 468 CC). Division is per stirpes: the representatives share among themselves the single portion that the represented person would have taken (Art. 469 CC).'
