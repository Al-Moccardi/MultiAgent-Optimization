- id: GS004
  text: What share of the reserved portion is due to the spouse when the deceased leaves two children?
  expected_agents:
  - A_succ_testamentaria
  - A_succ_legittima
  difficulty: medium
  risk_level: low
  category: legittima
  ground_truth_answer: When the spouse concurs with two or more children, Art. 542, para. 2 CC reserves one half (1/2) of the estate to the children collectively and one quarter (1/4) to the spouse, leaving one quarter (1/4) as the freely disposable quota. The spouse's reserved portion is therefore 1/4, in addition to the rights of habitation in the family home and of use of its furnishings under Art. 540, para. 2 CC.
