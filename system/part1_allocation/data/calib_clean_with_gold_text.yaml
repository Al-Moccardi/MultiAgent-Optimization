    text: Yes. Under Art. 603 CC the public will (testamento pubblico) is received by a notary in the continuous presence of two witnesses. The testator declares his wishes orally to the notary, who reduces them to writing and reads the act back to the testator in the witnesses' presence; mention of compliance with these formalities must appear in the deed, which is signed by testator, witnesses and notary. The two witnesses are an essential, non-waivable formality, so a public will always requires them.
