- id: GS010
  text: 'Succession of a person without children, without a spouse, with two living siblings: how are the assets divided?'
  expected_agents:
  - A_succ_legittima
  difficulty: medium
  risk_level: low
  category: successione_legittima
  ground_truth_answer: Where the deceased leaves no descendants, no spouse and no ascendants, the estate passes to the siblings under Art. 570 CC. Two surviving siblings therefore take the whole estate in equal shares (1/2 each). Half-blood siblings (unilaterali) receive one half of the share of full-blood siblings (Art. 570, para. 2 CC). If a parent or ascendant were alive, the siblings would instead concur with them under Art. 571 CC, but here, with only the two siblings, the split is equal.
