- id: GS012
  text: How is an inheritance accepted with benefit of inventory? Terms and procedures
  expected_agents:
  - A_succ_legittima
  - A_volontaria_giurisdizione
  difficulty: medium
  risk_level: medium
  category: accettazione
  ground_truth_answer: 'Acceptance with benefit of inventory is made by a declaration received by a notary or by the clerk of the court of the place where the succession opened, recorded in the succession register and transcribed (Art. 484 CC). An inventory must be drawn up within the statutory terms: an heir in possession of estate assets must make the inventory within three months of the opening (then has forty days to decide), while an heir not in possession may declare first and complete the inventory within set terms (Arts. 485-487 CC). The effect (Art. 490 CC) is the separation of the heir''s own patrimony from that of the deceased, so the heir answers for hereditary debts only within the value of what he receives (intra vires hereditatis). For minors and other incapables acceptance is always with benefit of inventory (Art. 471 CC) and requires authorisation of the tutelary judge.'
