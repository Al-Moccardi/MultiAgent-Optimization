- id: GS009
  text: In the absence of a will, who are the legal heirs and in what shares under Italian succession law?
  expected_agents:
  - A_succ_legittima
  difficulty: simple
  risk_level: low
  category: successione_legittima
  ground_truth_answer: 'In the absence of a will, succession devolves by law to the categories of Art. 565 CC, in order: spouse, descendants, ascendants, collaterals, other relatives up to the sixth degree, and finally the State. Main shares: children alone inherit in equal parts (Art. 566 CC); spouse and one child take one half each, while spouse and two or more children take 1/3 to the spouse and 2/3 to the children (Art. 581 CC); spouse concurring with ascendants and/or siblings takes 2/3, the rest 1/3 (Art. 582 CC); the spouse alone inherits the whole estate (Art. 583 CC). The spouse also enjoys the rights of habitation and use under Art. 540 CC.'
