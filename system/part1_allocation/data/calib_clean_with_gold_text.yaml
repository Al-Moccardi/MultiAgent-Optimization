- id: GS008
  text: 'The secret will: form, sealing requirements, and reception by the notary'
  expected_agents:
  - A_succ_testamentaria
  difficulty: simple
  risk_level: low
  category: succession_validity
  ground_truth_answer: 'The secret will (testamento segreto) combines a written sheet and an act of reception. Form (Art. 604 CC): it may be written by the testator or by a third party, by hand or by mechanical means; if not entirely handwritten and signed by the testator, he must sign each half-sheet; the paper is then sealed so that it cannot be opened or removed without breaking the seal. Reception (Art. 605 CC): the testator personally delivers the sealed will to a notary in the presence of two witnesses, declaring it contains his will; the notary writes the act of reception on the wrapper or envelope, stating the formalities, and it is signed by testator, witnesses and notary. The testator may withdraw it at any time (Art. 608 CC); if it lacks a formality of the secret will but meets the requirements of a holographic will, it is valid as such (Art. 607 CC).'
