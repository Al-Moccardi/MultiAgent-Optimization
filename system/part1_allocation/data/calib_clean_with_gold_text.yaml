- id: NEW_STRESS_010
  text: 'A widowed mother dies intestate under the community-of-property regime (never dissolved with her late husband), leaving three children: one adult and two minors under separate tutors. The hereditary mass includes assets that were partly community property with the deceased husband. Authorization from the guardianship judge is required for each minor acceptance; assisted negotiation is proposed to resolve disputes between the tutors over the division.'
  expected_agents:
  - A_succ_legittima
  - A_patrimoniale_comunione
  - A_tutela_minori
  - A_volontaria_giurisdizione
  - A_negoziazione_assistita_e_mediazione_familiare
  difficulty: complex
  risk_level: high
  high_risk: true
  category: intestate_minors_community_negotiation
  ground_truth_answer: 'Framework: (1) The undissolved legal community with the late husband must be liquidated first (Art. 191 CC): the husband''s half already devolved through his succession; the mother held her half, so on her death her half of the former community assets plus her own assets form the relictum. (2) Intestate, the three children take equal shares of 1/3 each (Art. 566 CC). (3) For each minor, acceptance is necessarily with benefit of inventory (Art. 471 CC); each tutor separately petitions the tutelary judge for authorisation to accept (Art. 374, no. 3 CC), and a special curator is appointed where the two minors'' interests conflict (Art. 320, last para. CC). (4) The division accounts for collation among the children (Arts. 737 ff. CC); assisted negotiation or mediation - mandatory as a condition of admissibility for hereditary division and successions (Art. 5 D.Lgs. 28/2010) - may resolve the tutors'' disputes, but any settlement affecting the minors still requires approval by the tutelary judge.'
  gold_law_ids:
  - IT_CC_art_191
  - IT_CC_art_566
  - IT_CC_art_471
  - IT_CC_art_374
  - IT_DLgs_28_2010_art_5
