- id: NEW_STRESS_006
  text: A married couple under the community-of-property regime jointly own a family business. They decide to convert to the separation-of-property regime via a notarial deed during the marriage. Two years later one spouse dies leaving a will dividing the business shares unequally between the surviving spouse and the children. How is the conversion treated in the succession, and what claims may the legittimari raise?
  expected_agents:
  - A_patrimoniale_comunione
  - A_patrimoniale_separazione
  - A_succ_testamentaria
  - A_succ_legittima
  difficulty: complex
  risk_level: medium
  category: regime_conversion_succession
  ground_truth_answer: 'Treatment of the conversion: a convention changing the matrimonial property regime is made by public deed before a notary (Arts. 162-163 CC) and, dissolving the legal community (Art. 191 CC), splits the community assets - including the family business - in equal halves between the spouses at the moment of conversion. Succession: at death the regime is separation of property, so the estate comprises only the deceased''s own assets (his half of the former business and his other assets). The will may freely allocate the shares within the disposable quota, but the forced heirs (spouse and children) may raise the action for reduction (Arts. 553 ff. CC) if their reserved shares (Arts. 537 and 542 CC) are impaired; the reserve is computed on the relictum net of debts plus the notional reunion of donations (Art. 556 CC). A neutral 50/50 split on conversion is not a donation, but any conversion that disguised a liberality could itself be drawn into that computation.'
  gold_law_ids:
  - IT_CC_art_162
  - IT_CC_art_191
  - IT_CC_art_537
  - IT_CC_art_542
  - IT_CC_art_556
