- id: GS005
  text: 'Case: the deceased disposed by will of the entire estate in favor of a third party, leaving a wife and three minor children. Is the will valid?'
  expected_agents:
  - A_succ_testamentaria
  - A_succ_legittima
  - A_tutela_minori
  difficulty: complex
  risk_level: high
  high_risk: true
  category: legittima_lesa
  ground_truth_answer: 'The will is valid but reducible. A testator may dispose only of the disposable quota; here the spouse concurs with three (more than two) children, so Art. 542, para. 2 CC reserves 1/2 to the children and 1/4 to the spouse, leaving only 1/4 disposable. The institution of the third party is not void: it is effective for the disposable 1/4, while the disposition exceeding it injures the reserved share and is subject to the action for reduction (azione di riduzione, Arts. 553-564 CC) brought by the forced heirs. Any clause burdening or conditioning the legittima is ineffective (Art. 549 CC). For the minor children, acceptance is necessarily with benefit of inventory (Art. 471 CC) and requires authorisation of the tutelary judge.'
  gold_law_ids:
  - IT_CC_art_542
  - IT_CC_art_457
  - IT_CC_art_549
  - IT_CC_art_553
  - IT_CC_art_471
