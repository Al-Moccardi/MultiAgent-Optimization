- id: GS014
  text: My father died under the legal community-of-property regime with my mother, leaving me and my brother as the only heirs. How is the hereditary mass calculated?
  expected_agents:
  - A_succ_legittima
  - A_patrimoniale_comunione
  difficulty: complex
  risk_level: medium
  category: successione_comunione
  ground_truth_answer: 'Death dissolves the legal community of property (Art. 191 CC). The surviving spouse (your mother) first takes, in her own right and not as inheritance, one half of the assets that fell into the community under Art. 177 CC; the deceased father''s half of the community assets, together with his personal/separate assets (Art. 179 CC), forms the relictum. The hereditary mass to be divided is therefore: father''s 1/2 of the community assets + his personal assets, less the hereditary debts; for the purpose of the reserved shares this relictum is then notionally augmented by the value of his lifetime donations (riunione fittizia, Art. 556 CC). The heirs (intestate) are the mother and the two children, who take respectively 1/3 and 2/3 under Art. 581 CC, unless a will provides otherwise.'
  gold_law_ids:
  - IT_CC_art_191
  - IT_CC_art_177
  - IT_CC_art_179
  - IT_CC_art_581
  - IT_CC_art_556
