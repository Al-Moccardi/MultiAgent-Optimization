queries:
- id: GS001
  text: What are the conditions for the validity of a holographic will?
  expected_agents:
  - A_succ_testamentaria
  difficulty: simple
  risk_level: low
  category: succession_validity
  ground_truth_answer: 'A holographic will is valid only if it satisfies the three cumulative requirements of Art. 602 CC: (1) autografia - it must be written entirely in the testator''s own hand; (2) the date - day, month and year; and (3) the testator''s signature (sottoscrizione) at the end, sufficient to identify him. The testator must also have testamentary capacity (Art. 591 CC). Lack of handwriting or of the signature makes the will null; defects in the date or other formalities make it merely annullable on action of an interested party within five years (Art. 606 CC).'
  gold_law_ids:
  - IT_CC_art_602
  - IT_CC_art_606
  - IT_CC_art_591
