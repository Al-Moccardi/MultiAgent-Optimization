- id: GS007
  text: Can I disinherit a child in a will? In what cases is disinheritance permitted under Italian law?
  expected_agents:
  - A_succ_testamentaria
  - A_succ_legittima
  difficulty: medium
  risk_level: medium
  category: diseredazione
  ground_truth_answer: 'A child is a forced heir (legittimario) entitled to a reserved share (Arts. 536 ff. CC). A mere testamentary clause excluding a child (diseredazione) does not deprive him of the legittima: the child can still claim it through the action for reduction, and any provision burdening the reserved share is void (Art. 549 CC). Italian case law (e.g. Cass. 8352/2012) admits disinheritance as an implicit disposition, but only of the disposable quota - it can never defeat the reserved share. A child can be wholly excluded from the succession only where he is declared unworthy (indegnita) on the limited grounds of Art. 463 CC, such as killing or attempting to kill the deceased or serious offences against him.'
