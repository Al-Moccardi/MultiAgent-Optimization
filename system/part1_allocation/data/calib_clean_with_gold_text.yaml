- id: NEW_STRESS_001
  text: 'A separated couple under the community-of-property regime: the husband dies intestate before the separation is finalized, leaving two minor children. The surviving wife requests dissolution of the community and the appointment of a guardian for the inheritance share of the minors. How is the hereditary mass calculated, what protections apply to the minors, and what is the status of the pending separation proceeding?'
  expected_agents:
  - A_succ_legittima
  - A_patrimoniale_comunione
  - A_tutela_minori
  - A_volontaria_giurisdizione
  - A_separazione_contenziosa
  difficulty: complex
  risk_level: high
  high_risk: true
  category: succession_separation_minors
  ground_truth_answer: 'Pending-separation status: the personal separation proceeding is extinguished by the death of a party (the matrimonial bond ends by death, not by the abated action), so the spouses are deemed still married at the opening of the succession and the surviving wife retains full spousal succession rights. Hereditary mass: death dissolves the legal community (Art. 191 CC); the wife takes 1/2 of the community assets iure proprio, and the husband''s 1/2 plus his personal assets (Art. 179 CC), net of debts, forms the relictum. Intestate shares with spouse + two children: spouse 1/3, children 2/3 (Art. 581 CC). Protection of the minors: acceptance is necessarily with benefit of inventory (Art. 471 CC); the surviving parent/tutor must obtain authorisation from the tutelary judge to accept (Art. 320 CC), and where her interest conflicts with the children''s a special curator is appointed (Art. 320, last para. CC; Art. 78 CPC). These authorisations proceed in voluntary jurisdiction.'
