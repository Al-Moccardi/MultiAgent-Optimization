- id: NEW_STRESS_001
  text: 'A separated couple under the community-of-property regime: the husband dies
    intestate before the separation is finalized, leaving two minor children. The
    surviving wife requests dissolution of the community and the appointment of a
    guardian for the inheritance share of the minors. How is the hereditary mass calculated,
    what protections apply to the minors, and what is the status of the pending separation
    proceeding?'
  expected_agents:
  - A_succ_legittima
  - A_patrimoniale_comunione
  - A_tutela_minori
  - A_volontaria_giurisdizione
  - A_separazione_contenziosa
