  risk_level: high
  category: consensual_separation_succession_minor
- id: NEW_STRESS_006
  text: A married couple under the community-of-property regime jointly own a family
    business. They decide to convert to the separation-of-property regime via a notarial
    deed during the marriage. Two years later one spouse dies leaving a will dividing
    the business shares unequally between the surviving spouse and the children. How
    is the conversion treated in the succession, and what claims may the legittimari
    raise?
  expected_agents:
  - A_patrimoniale_comunione
  - A_patrimoniale_separazione
  - A_succ_testamentaria
  - A_succ_legittima
  difficulty: complex
  risk_level: medium
  category: regime_conversion_succession
