  text: Following an attempted contested separation that fails in court, the spouses
    proceed with family mediation and reach a consensual settlement that includes
    the assignment of the marital home to the wife and custody of two minor children
    to her. One year later the wife dies, and the children inherit her share of the
    marital home. The ex-husband requests appointment as tutor and authorization to
    manage the inherited real estate.
