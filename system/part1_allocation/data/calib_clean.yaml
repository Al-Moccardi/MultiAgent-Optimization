  - A_succ_legittima
  - A_tutela_minori
  - A_volontaria_giurisdizione
  - A_patrimoniale_comunione
  difficulty: complex
  risk_level: high
  category: succession_minors_property
- id: NEW_STRESS_004
  text: Two spouses, married under the separation-of-property regime, are in contested
    separation proceedings. During the proceedings the husband dies leaving a holographic
    will that names a third party as universal heir. The wife claims her reserved
    share and contests the will. What is the impact of the unresolved separation on
    succession rights, and how does the matrimonial property regime affect the hereditary
    mass?
  expected_agents:
  - A_separazione_contenziosa
  - A_succ_testamentaria
  - A_succ_legittima
  - A_patrimoniale_separazione
  difficulty: complex
  risk_level: high
  high_risk: true
  category: separation_pending_succession
- id: NEW_STRESS_005
  text: A consensually-separated couple with one minor child reaches an agreement
    via assisted negotiation that includes mutual succession provisions. The wife
    later dies intestate, leaving the minor child as sole heir. The ex-husband, as
    tutor, must request court authorization to renounce part of the inheritance burdened
    with debts. Outline the steps.
  expected_agents:
  - A_separazione_consensuale
  - A_negoziazione_assistita_e_mediazione_familiare
