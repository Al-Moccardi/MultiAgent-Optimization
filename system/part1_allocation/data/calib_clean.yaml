  text: A testator leaves a will dividing the estate among three heirs, two of whom
    are minors under guardianship. One minor tutor seeks court authorization to accept
    the inheritance with benefit of inventory; the other minor tutor seeks to renounce
    due to encumbered assets. The third heir, an adult, opens collation proceedings.
    What procedural framework governs these divergent positions?
