  risk_level: high
  high_risk: true
  category: succession_separation_minors
- id: NEW_STRESS_002
  text: The testator dies leaving a will that institutes a foundation as universal
    heir, while the surviving spouse and two adult children claim violation of the
    reserved share. Mediation between the heirs and the foundation is attempted before
    bringing the action. How is the reserved portion computed, what remedies are available,
    and what is the role of family mediation in this dispute?
  expected_agents:
  - A_succ_testamentaria
  - A_succ_legittima
  - A_negoziazione_assistita_e_mediazione_familiare
  difficulty: complex
  risk_level: high
  category: legittima_lesa_mediation
- id: NEW_STRESS_003
  text: A widowed father with two minor children dies leaving an estate that includes
    real estate co-owned with his late wife under a community-of-property regime that
    was never dissolved. A tutor must be appointed for the children, and authorization
    from the guardianship judge is required to accept the inheritance with benefit
    of inventory. What is the procedural sequence?
