# Candidate configuration catalog: models x quantizations x contexts.
# Target ~24-30 configs. EDIT gguf_path to your local GGUF files.
# Pick Italian-capable models (vet before including). All must run via llama.cpp.
#
# config_id is auto-built as: <key>__<quant.label>__c<context>
#
# NOTE: params_b is provenance / tie-break ONLY -- it is NOT the objective.
#       The objective is measured quality Q_{a,k} from the quality sweep.

